<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Eco City Animation</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#111;
overflow:hidden;
}

/* Sky */

.scene{

width:900px;
height:520px;
position:relative;
overflow:hidden;
border-radius:20px;
border:5px solid white;
box-shadow:0 0 30px rgba(0,255,255,.5);

animation:sky 15s infinite alternate;

}

@keyframes sky{

0%{background:#87CEEB;}
50%{background:#68bdf7;}
100%{background:#FFB56B;}

}

/* Title */

.title{

position:absolute;
top:15px;
width:100%;
text-align:center;
font-size:34px;
font-weight:bold;
color:white;
animation:glow 2s infinite;

}

@keyframes glow{

50%{
text-shadow:0 0 20px yellow;
}

}

/* Sun */

.sun{

width:90px;
height:90px;
border-radius:50%;
background:gold;
position:absolute;
left:70px;
top:60px;
box-shadow:0 0 40px yellow;

animation:spin 8s linear infinite;

}

.sun::before{

content:"";

position:absolute;
width:120px;
height:120px;
border:3px dashed rgba(255,255,0,.5);
border-radius:50%;
top:-15px;
left:-15px;

}

@keyframes spin{

from{transform:rotate(0);}
to{transform:rotate(360deg);}

}

/* Clouds */

.cloud{

position:absolute;
width:120px;
height:45px;
background:white;
border-radius:50px;
animation:cloud 18s linear infinite;

}

.cloud::before{

content:"";
position:absolute;
width:55px;
height:55px;
background:white;
border-radius:50%;
left:20px;
top:-25px;

}

.cloud::after{

content:"";
position:absolute;
width:70px;
height:70px;
background:white;
border-radius:50%;
right:15px;
top:-35px;

}

.c1{top:90px;left:-150px;}
.c2{top:160px;left:-350px;animation-delay:5s;}
.c3{top:60px;left:-550px;animation-delay:10s;}

@keyframes cloud{

from{transform:translateX(0);}
to{transform:translateX(1200px);}

}

/* Bird */

.bird{

position:absolute;
font-size:35px;
top:110px;
left:-100px;
animation:bird 12s linear infinite;

}

@keyframes bird{

from{transform:translateX(0);}
to{transform:translateX(1100px);}

}

/* Ground */

.ground{

position:absolute;
bottom:0;
width:100%;
height:150px;
background:#5BAF45;

}

/* Road */

.road{

position:absolute;
bottom:50px;
width:100%;
height:50px;
background:#444;

}

.road::after{

content:"";
position:absolute;
width:100%;
height:5px;
top:22px;

background:
repeating-linear-gradient(
to right,
white 0,
white 40px,
transparent 40px,
transparent 80px);

}

/* Electric Car */

.car{

position:absolute;
bottom:60px;
left:-120px;
font-size:55px;

animation:drive 12s linear infinite;

}

@keyframes drive{

from{transform:translateX(0);}
to{transform:translateX(1100px);}

}

/* Turbine */

.turbine{

position:absolute;
bottom:150px;
right:120px;

}

.pole{

width:8px;
height:140px;
background:#555;
margin:auto;

}

.blades{

position:absolute;
width:90px;
height:90px;
left:-40px;
top:-35px;

animation:rotate 2s linear infinite;

}

.blades div{

position:absolute;
width:45px;
height:8px;
background:#333;
transform-origin:left;

}

.b1{transform:rotate(0deg);}
.b2{transform:rotate(120deg);}
.b3{transform:rotate(240deg);}

@keyframes rotate{

from{transform:rotate(0);}
to{transform:rotate(360deg);}

}

/* Solar Panel */

.panel{

position:absolute;
bottom:90px;
left:180px;

width:180px;
height:70px;

background:#1565C0;

transform:skew(-20deg);

border:4px solid #222;

transition:.5s;

}

.panel:hover{

background:#29B6F6;
box-shadow:0 0 25px cyan;
transform:skew(-20deg) scale(1.08);

}

/* Trees */

.tree{

position:absolute;
bottom:145px;
font-size:65px;
animation:sway 3s ease-in-out infinite;

}

.t1{left:470px;}
.t2{left:560px;animation-delay:1s;}
.t3{left:650px;animation-delay:2s;}

@keyframes sway{

0%,100%{
transform:rotate(-3deg);
}

50%{
transform:rotate(3deg);
}

}

/* Energy Meter */

.energy{

position:absolute;
top:70px;
right:20px;

padding:15px;

background:rgba(255,255,255,.8);

border-radius:12px;

font-weight:bold;

animation:pulse 2s infinite;

}

@keyframes pulse{

50%{
transform:scale(1.08);
}

}

/* Bubbles */

.bubble{

position:absolute;
bottom:0;
font-size:18px;
color:white;
opacity:.6;

animation:rise 8s linear infinite;

}

.bb1{left:80px;}
.bb2{left:300px;animation-delay:2s;}
.bb3{left:700px;animation-delay:4s;}

@keyframes rise{

from{
transform:translateY(0);
opacity:.7;
}

to{
transform:translateY(-550px);
opacity:0;
}

}

</style>

</head>

<body>

<div class="scene">

<div class="title">
🌍 Smart Eco City
</div>

<div class="sun"></div>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<div class="bird">🦅</div>

<div class="energy">
⚡ Energy : 98%
</div>

<div class="panel"></div>

<div class="turbine">

<div class="blades">

<div class="b1"></div>
<div class="b2"></div>
<div class="b3"></div>

</div>

<div class="pole"></div>

</div>

<div class="tree t1">🌳</div>
<div class="tree t2">🌳</div>
<div class="tree t3">🌳</div>

<div class="car">🚗</div>

<div class="bubble bb1">💧</div>
<div class="bubble bb2">💧</div>
<div class="bubble bb3">💧</div>

<div class="road"></div>

<div class="ground"></div>

</div>

</body>
</html>
